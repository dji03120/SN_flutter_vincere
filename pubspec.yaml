name: Vincere
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  wave: ^0.2.0
  path_provider:
  path:
  table_calendar: ^3.0.6
  intl: ^0.20.2 
  shared_preferences: ^2.3.2
  image_picker: ^0.8.9
  fl_chart: ^0.65.0
  percent_indicator: ^4.2.3
  flutter_web_bluetooth: ^1.1.0
  flutter_blue_plus: ^1.4.0
  provider: ^6.1.5+1

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.6
  http: ^1.2.2  # 1 통신 택 1
  dio: ^5.0.0 # 2 통신 택 1
  flutter_swiper_null_safety:
  auto_size_text:
  flutter_html: 2.2.1
  # win32: ^3.1.4
  url_launcher: ^6.3.1
  html: ^0.15.0
  flutter_radar_chart: ^0.2.1
  daum_postcode_search: ^0.0.2
  geolocator: ^14.0.1
  js: ^0.6.5
  smooth_page_indicator: ^1.0.0  # 최신 버전으로 확인하세요
  convert: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - images/
    - assets/images/
    - assets/images/workout_elexir/
    - assets/videos/

  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansKR-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansKR-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansKR-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSansKR-ExtraBold.ttf
          weight: 800
        #- asset: assets/fonts/NotoSansKR-Black.ttf
        #  weight: 900
    - family: NunitoSans
      fonts:
        - asset: assets/fonts/number/NunitoSans_10pt-Bold.ttf
          weight: 600
        - asset: assets/fonts/number/NunitoSans_10pt-ExtraBold.ttf
          weight: 700
